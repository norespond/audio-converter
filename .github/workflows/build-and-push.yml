# This workflow will build and push a Docker image to Docker Hub
name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build the Docker image
        run: |
          docker build -t norespond/audio-converter:${{ github.sha }} .

      - name: Push the Docker image
        run: |
          docker push norespond/audio-converter:${{ github.sha }}
          docker push norespond/audio-converter:latest
